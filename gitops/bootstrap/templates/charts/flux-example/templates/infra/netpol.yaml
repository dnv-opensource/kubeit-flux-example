{{- if and .Values.infrastructure.enabled .Values.infrastructure.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ .Values.infrastructure.namespace }}
  labels:
    {{- include "flux-bootstrap.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
{{- end }}
