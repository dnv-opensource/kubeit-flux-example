{{- if .Values.environments.prod.enabled }}
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: prod-infrastructure
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "flux-bootstrap.labels" . | nindent 4 }}
    environment: prod
spec:
  interval: {{ .Values.environments.prod.syncInterval }}
  retryInterval: {{ .Values.environments.prod.retryInterval }}
  path: {{ .Values.git.path }}/infra/base
  prune: {{ .Values.environments.prod.prune }}
  sourceRef:
    kind: GitRepository
    name: flux-system-prod
  targetNamespace: {{ .Values.infrastructure.namespace }}
{{- end }}
