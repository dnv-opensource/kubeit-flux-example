platform-service:
  app: admin-api
  version: v1

  gateway:
    exposeService: true
    name: istio-system/global-https-internal-default-gateway
  image:
    fluxAutomation:
      enabled: true
      provider: generic
      interval: 1m
      filterTags:
        pattern: '^\d+\.\d+\.\d+$'
      policy:
        semver:
          range: '>=1.0.0'

