platform-service:
  app: admin-api
  version: v1

  image:
    registry: ngpdevacr.azurecr.io
    repository: smc-admin-api
    pullPolicy: IfNotPresent

  gateway:
    exposeService: true
    name: istio-system/global-https-internal-default-gateway

  defaultRouting:
    enabled: true
    urlPrefixes:
      - portal
    retries:
      enabled: true
      settings:
        attempts: 3
        perTryTimeout: 180s

  requestAuthentication:
    jwtRules:
      - issuer: "https://login.veracity.com/a68572e3-63ce-4bc1-acdc-b64943502e9d/v2.0/"
        jwksUri: "https://login.veracity.com/te/a68572e3-63ce-4bc1-acdc-b64943502e9d/b2c_1a_signinwithadfsidp/discovery/v2.0/keys"
        forwardOriginalToken: true

  resources:
    requests:
      cpu: 20m
      memory: 250Mi
    limits:
      memory: 400Mi

  proxyResources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 512Mi

  volumes:
    - name: app-settings-volume
      mountPath: "/app/config"
      volumeDefinition: |
        configMap:
          name: admin-api
    - name: app-secrets-volume
      mountPath: "/app/secrets"
      volumeDefinition: |
        secret:
          secretName: admin-api-file
