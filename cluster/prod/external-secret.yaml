apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-sops
  namespace: sops-prod
spec:
  data:
    - secretKey: identity        # Private key (for authentication)
      remoteRef:
        key: "sshkey--identity"
    - secretKey: identity.pub    # Public key (reference)
      remoteRef:
        key: "sshkey--identity-pub"
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: global-kv-secretstore
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
    name: flux-sops-sshkeys
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: shared-kv-secretstore
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      environmentType: PublicCloud
      serviceAccountRef:
        name: flux-sops-sa
      vaultUrl: https://kubeit-aux-kv-sh-we.vault.azure.net/
---
apiVersion: v1
automountServiceAccountToken: false
kind: ServiceAccount
metadata:
  annotations:
    azure.workload.identity/client-id: c29edcad-9e4c-4e14-b497-60d87c865b2a
    azure.workload.identity/tenant-id: adf10e2b-b6e9-41d6-be2f-c12bb566019c
  name: flux-sops-sa

