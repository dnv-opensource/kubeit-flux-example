apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-sync
  namespace: tenant2-sops-prod
spec:
  serviceAccountName: tenant2-flux-sa
  interval: 1m
  targetNamespace: tenant2-sops-prod
  sourceRef:
    kind: GitRepository
    name: tenant
  path: infra/prod
  prune: true
  decryption:
    provider: sops
