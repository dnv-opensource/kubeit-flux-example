apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: infra-sync
  namespace: simple-example
spec:
  serviceAccountName: tenant2-flux-sa
  interval: 1m
  targetNamespace: simple-example
  sourceRef:
    kind: OCIRepository
    name: tenant
  path: infra/staging
  prune: true
  decryption:
    provider: sops
